--disk-cache-dir=/tmp/cache
--process-per-site

# ── Intel UHD 620 (Kaby Lake-R) hardware acceleration ───────────────────────
# Requires host package `intel-media-driver` (iHD) and LIBVA_DRIVER_NAME=iHD
# exported in the X session (see ~/.xsessionrc). Lines starting with # are
# ignored by the Arch chromium/brave launcher.
--enable-features=VaapiVideoDecoder,VaapiVideoEncoder,CanvasOopRasterization
--use-gl=desktop
--enable-gpu-rasterization
--enable-zero-copy
--ignore-gpu-blocklist
--disable-gpu-driver-bug-workarounds

# ── Verify hardware decode is actually used (run on host) ────────────────────
#   vainfo            : shows active VA-API driver + supported VAProfile* codecs.
#                       Confirms iHD is loaded and which codecs are hw-decodable.
#   intel_gpu_top     : live GPU engine utilisation; the "Video" engine goes
#                       busy during hw decode (stays 0% + high CPU if software).
#   brave://media-internals : during playback shows the real decoder picked
#                       (Vp9_HW/MojoVideoDecoder = hw, FFmpegVideoDecoder = sw).
