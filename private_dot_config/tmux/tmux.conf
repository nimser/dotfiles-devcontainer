# ── Shell ────────────────────────────────────────────────────────────────────
set-option -g default-shell /usr/bin/fish

# ── General ──────────────────────────────────────────────────────────────────
set -g base-index 1               # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on        # keep numbers contiguous after close
set -g history-limit 50000
set -g escape-time 10             # faster ESC in nvim
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# True colour + italics
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix: keep default Ctrl-b ───────────────────────────────────────────--
# (change to C-a here if preferred)

# ── Window / pane navigation ─────────────────────────────────────────────────
# Alt+arrow: switch panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift+arrow: switch windows without prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Split with | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── Catppuccin Macchiato palette ─────────────────────────────────────────────
# (manual, no plugin needed)
clr_base="#24273a"
clr_mantle="#1e2030"
clr_surface0="#363a4f"
clr_surface1="#494d64"
clr_text="#cad3f5"
clr_subtext1="#b8c0e0"
clr_mauve="#c6a0f6"
clr_flamingo="#f0c6c6"
clr_peach="#f5a97f"
clr_green="#a6da95"
clr_teal="#8bd5ca"
clr_sapphire="#7dc4e4"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#{clr_base},fg=#{clr_text}"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#{clr_mauve},fg=#{clr_base},bold] #{session_name} #[bg=#{clr_base},fg=#{clr_mauve}]"

# Right: host · date/time
set -g status-right-length 60
set -g status-right "#[fg=#{clr_surface1}]#[bg=#{clr_surface1},fg=#{clr_subtext1}] %H:%M  %d %b #[bg=#{clr_surface1},fg=#{clr_mantle}]#[bg=#{clr_mantle},fg=#{clr_subtext1}] #h "

# Window tabs
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[bg=#{clr_surface0},fg=#{clr_mauve},bold] #I:#W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-style          "fg=#{clr_subtext1}"
set -g window-status-current-style  "bg=#{clr_surface0},fg=#{clr_mauve}"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style        "fg=#{clr_surface0}"
set -g pane-active-border-style "fg=#{clr_mauve}"

# Messages
set -g message-style "bg=#{clr_surface0},fg=#{clr_peach}"
