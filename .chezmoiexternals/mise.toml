[".local/bin/mise"]
type = "file"
executable = true
url = "https://mise.jdx.dev/mise-latest-{{.chezmoi.os}}-{{.chezmoi.arch}}"
# No refreshPeriod: interactive `chezmoi apply` should never stall on this
# 94 MB download. chezmoi-refresh-externals.timer (systemd user unit) runs
# `chezmoi apply --include=externals --refresh-externals=always` weekly in
# the background instead.
